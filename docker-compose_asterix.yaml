services:
  asterixdb:
    image: mp4sini/asterixdb:latest
    hostname: asterixdb
    container_name: asterixdb
    user: "0:0"
    command:
      - /bin/bash
      - -c
      - |
        cp /asterixsetup/cc.conf opt/local/conf/cc.conf
        opt/local/bin/start-sample-cluster.sh
        tail -f /dev/null
    # volumes:
    #   - ./datasets/dump/asterixdb:/workspace/asterixdb/asterixdb/asterix-server/target/asterix-server-0.9.10-SNAPSHOT-binary-assembly/apache-asterixdb-0.9.10-SNAPSHOT/opt/local/data
    ports:
      - 19006:19006
      - 19002:19002
      - 19001:19001
      - 19003:19003
      - 10001-11000:10001-11000
      - 1009:1009
      - 1098:1098
